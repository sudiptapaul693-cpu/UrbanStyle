<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;

background:
linear-gradient(
rgba(0,0,0,.7),
rgba(0,0,0,.7)
),
url("https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=1600");

background-size:cover;
background-position:center;
}

.login-box{
background:white;
padding:45px;
width:420px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.4);
}

.logo{
font-size:48px;
text-align:center;
margin-bottom:10px;
}

.logo span{
color:#e60023;
}

.subtitle{
text-align:center;
color:#777;
margin-bottom:25px;
}

input{
width:100%;
padding:16px;
font-size:16px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:16px;
background:#e60023;
color:white;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

</style>
</head>
<body>

<div class="login-box">

<h1 class="logo">
URBAN<span>STYLE</span>
</h1>

<p class="subtitle">
Admin Panel Access
</p>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

</div>

<script>

 if(localStorage.getItem("adminLoggedIn") === "true"){

window.location.href = "admin.html";

}   

function login(){

let username =
document.getElementById("username").value.trim();

let password =
document.getElementById("password").value.trim();

if(username == "admin" &&
   password == "admin123"){

    localStorage.setItem("adminLoggedIn","true");

window.location.href = "admin.html";

}else{

    alert("Invalid Username or Password");

}

}

function logout(){

localStorage.removeItem("adminLoggedIn");

window.location.href = "login.html";

}

</script>

</body>
</html>
